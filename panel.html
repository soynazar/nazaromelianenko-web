<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ATENEOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;500&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#f7f4f0; --card:#ffffff; --ink:#2b2723; --muted:#a29a91; --muted2:#c4bcb2;
  --terra:#c56b49; --terra-dark:#b25a3a; --terra-soft:#f8e9e3; --terra-soft2:#fbf1ec;
  --green:#2e7d51; --green-soft:#e4f2e9; --red:#b0432a; --line:#ece7e1;
  --mono:'JetBrains Mono',monospace; --sans:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:16px; overflow: hidden; height: 100vh;}
button{font-family:var(--sans);cursor:pointer}
input,select,textarea{font-family:var(--sans);font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--terra);outline-offset:-1px}
label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.mono{font-family:var(--mono)}

/* ---------- login ---------- */
.login-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
.login-box { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
.login-box h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; letter-spacing: 0.1em; color: var(--ink); }
.login-msg { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }
/* ---------- marca ---------- */
.brand-lockup{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:28px}
.brand-mark{width:41px;height:41px;object-fit:contain;display:block}
.brand-block{display:inline-flex;flex-direction:column;align-items:center}
.brand-word{font-family:'Raleway',sans-serif;font-weight:200;font-size:24px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink);line-height:1;display:block;white-space:nowrap}
.brand-by{margin-top:26px;text-align:center;font-family:'Raleway',sans-serif;font-size:9px;letter-spacing:.3em;color:var(--muted2);font-weight:400}
.brand-sig{display:block;margin:11px auto 0;width:33px;height:33px;object-fit:contain;opacity:.3}
.brand-sub{margin-top:3px;font-family:'Raleway',sans-serif;font-weight:500;font-size:7.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);display:block;white-space:nowrap}

/* ---------- layout ---------- */
#app{display:flex; height:100vh; width: 100%;}
aside{width:300px;min-width:300px;background:#f2eee9;border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.brand{display:flex;align-items:center;gap:12px;padding:22px 20px 16px}
.brand .brand-mark{width:36px;height:36px;object-fit:contain;display:block}
.brand h1{font-family:'Raleway',sans-serif;font-size:16px;letter-spacing:.24em;font-weight:200;text-transform:uppercase;line-height:1;color:var(--ink)}
.brand small{display:block;font-family:'Raleway',sans-serif;font-size:7px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-top:2px}
.side-actions{padding:0 16px 10px;display:flex;gap:8px}
.side-actions button{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 8px;font-size:12px;letter-spacing:.1em;color:var(--ink); transition: 0.2s;}
.side-actions button:hover{border-color: var(--muted);}
.side-nav{padding:8px 0;border-bottom:1px solid var(--line)}
.side-nav a{display:block;padding:9px 22px;font-size:12.5px;letter-spacing:.16em;color:#6f6960;text-decoration:none;text-transform:uppercase}
.side-nav a:hover,.side-nav a.on{color:var(--terra-dark)}
#studentList{flex:1;overflow-y:auto;padding:6px 0 90px}

/* Alumnos Sidebar */
.stud{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent}
.stud:hover{background:#ece6df}
.stud.on{background:var(--terra-soft2);border-left-color:var(--terra)}
.stud .av{width:38px;height:38px;border-radius:50%;background:#d9d2c9;color:#7c756c;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.stud.on .av{background:var(--terra);color:#fff}
.stud .nm{font-size:15.5px;line-height:1.2; flex: 1;}
.stud .sd{font-family:var(--mono);font-size:12px;color:var(--muted)}
.stud .sd.neg{color:var(--red)}
.stud .sd.bono{background: var(--green-soft); color: var(--green); padding: 2px 6px; border-radius: 6px; font-size: 10.5px; letter-spacing: 0.05em; font-family: var(--sans); font-weight: 500;}

.newstud{position:absolute;bottom:16px;left:16px;right:16px}
.newstud button{width:100%;background:var(--terra);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px; transition: 0.2s;}
.newstud button:hover{background:var(--terra-dark)}

main{flex:1;padding:28px 40px; overflow-y: auto;}

/* ---------- generic ---------- */
.kicker{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.h-title{font-size:34px;font-weight:400}
.cards{display:flex;gap:14px;margin:20px 0;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;flex:1;min-width:130px}
.card .lb{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.card .vl{font-family:var(--mono);font-size:30px;margin-top:8px}
.btn{border:none;border-radius:12px;padding:12px 20px;font-size:15.5px; transition: 0.2s;}
.btn-terra{background:var(--terra);color:#fff}
.btn-terra:hover{background:var(--terra-dark)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--muted2)}
.btn-green{background:#fff;border:1px solid #bfe0cc;color:var(--green)}
.btn-danger{background:#fff;border:1px solid #ecc9be;color:var(--red)}
.badge{display:inline-block;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;padding:4px 10px;border-radius:8px}
.badge.paid{background:var(--green-soft);color:var(--green)}
.badge.unpaid{background:var(--terra-soft);color:var(--red)}
.badge.state{background:var(--green-soft);color:var(--green);border:none;cursor:pointer}
.badge.state.cancelada{background:#eee9e3;color:var(--muted)}
.stsel{width:auto;font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;padding:3px 8px;border-radius:8px;border:1px solid var(--line);cursor:pointer}
.stsel.ok{background:var(--green-soft);color:var(--green);border-color:#bfe0cc}
.stsel.wt{background:var(--terra-soft);color:var(--terra-dark);border-color:#ecc9be}
.stsel.cx{background:#eee9e3;color:var(--muted)}

/* ---------- student header ---------- */
.shead{display:flex;align-items:flex-start;gap:18px}
.shead .av{width:64px;height:64px;border-radius:50%;background:var(--terra);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px}
.shead .meta{font-size:15px;color:var(--muted)}
.shead .meta .mono{color:var(--ink)}
.stats{display:flex;gap:34px;margin:18px 0 6px;flex-wrap:wrap}
.stats div .lb{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.stats div .vl{font-family:var(--mono);font-size:24px;margin-top:4px}
.topbtns{position:absolute;top:26px;right:40px;display:flex;gap:10px}
.actions{display:flex;gap:12px;margin:18px 0 8px;flex-wrap:wrap}

/* ---------- class rows ---------- */
.clase{display:flex;gap:26px;padding:22px 4px;border-bottom:1px solid var(--line)}
.clase .when{font-family:var(--mono);min-width:86px}
.clase .when .d{font-size:16px}
.clase .when .h{font-size:13px;color:var(--muted)}
.clase .body{flex:1}
.clase .tema{font-size:17px}
.clase .prox{border-left:3px solid var(--terra);padding:2px 0 2px 10px;margin-top:8px;font-size:14.5px;color:var(--muted)}
.clase .prox b{color:var(--terra-dark);font-weight:500}
.clase .tags{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.clase .rowbtns{display:flex;gap:6px;opacity:0;transition:.15s}
.clase:hover .rowbtns{opacity:1}
.icobtn{background:none;border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:12px;color:var(--muted)}
.icobtn:hover{color:var(--ink);border-color:var(--muted2)}

/* ---------- deuda list ---------- */
.deuda{display:flex;align-items:center;gap:14px;background:var(--terra-soft2);border-radius:14px;padding:16px 22px;margin-bottom:12px;cursor:pointer}
.deuda:hover{background:var(--terra-soft)}
.deuda .av{width:36px;height:36px;border-radius:50%;background:#ddd5cb;color:#7c756c;display:flex;align-items:center;justify-content:center;font-size:12px}
.deuda .amt{margin-left:auto;font-family:var(--mono);color:var(--red);font-size:15px}
.sect{font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--terra-dark);margin:26px 0 14px}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(40,34,28,.45);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px;z-index:50}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;padding:30px 34px;width:100%;max-width:640px;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h2{font-size:24px;font-weight:400;margin-bottom:4px}
.modal .x{position:absolute;top:18px;right:22px;background:none;border:none;font-size:20px;color:var(--muted)}
.minicards{display:flex;gap:10px;margin:16px 0}
.minicard{border:1px solid var(--line);border-radius:12px;padding:12px 14px;flex:1;background:#faf8f5}
.minicard .lb{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.minicard .vl{font-family:var(--mono);font-size:21px;margin-top:4px}
.repline{display:flex;gap:14px;padding:11px 2px;border-bottom:1px solid var(--line);align-items:center;font-size:15.5px}
.repline .mono{color:var(--muted);font-size:13.5px}
.repline .bdg{margin-left:auto}
.reporte{background:#faf8f5;border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:18px;font-family:var(--mono);font-size:13px;line-height:1.75;white-space:pre-wrap;color:#5d564e}
.frow{display:flex;gap:14px}
.frow>div{flex:1}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99}
#toast.show{opacity:1}
/* ---------- navegación de mes ---------- */
.monthnav{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.monthnav .h-title{margin:0}
.monthnav button{background:#fff;border:1px solid var(--line);border-radius:10px;width:34px;height:34px;font-size:15px;color:var(--muted);line-height:1;transition:.2s}
.monthnav button:hover{border-color:var(--muted2);color:var(--ink)}
/* ---------- calendario (rejilla 7 columnas) ---------- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal .dow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0 6px}
.cal .day{min-height:96px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px;font-family:var(--mono);font-size:12.5px;color:var(--muted2);display:flex;flex-direction:column;gap:4px}
.cal .day.off{background:transparent;border:none}
.cal .day.today{border-color:var(--terra);box-shadow:inset 0 0 0 1px var(--terra);color:var(--terra-dark)}
.cal .chip{background:var(--terra-soft2);color:var(--terra-dark);border-radius:7px;padding:3px 7px;font-size:10.5px;font-family:var(--sans);line-height:1.25;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal .chip:hover{background:var(--terra-soft)}
/* ---------- agenda semanal ---------- */
.agday{margin-bottom:22px}
.agday h3{font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--terra-dark);font-weight:500;margin-bottom:10px}
.agitem{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:.15s}
.agitem:hover{border-color:var(--muted2)}
.agitem .mono{min-width:52px;color:var(--ink)}
.empty{color:var(--muted);padding:22px 2px;font-size:15px}
/* ---------- móvil ---------- */
.nav-toggle{display:none;position:fixed;top:14px;left:14px;z-index:70;width:42px;height:42px;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:12px;font-size:18px;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer}
.nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:55}
@media (max-width:760px){
  aside{position:fixed;left:0;top:0;width:86vw;min-width:0;max-width:320px;z-index:60;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.15)}
  body.nav-open aside{transform:translateX(0)}
  body.nav-open .nav-backdrop{display:block}
  .nav-toggle{display:flex}
  main{padding:64px 18px 40px}
  .stats{flex-wrap:wrap;gap:14px 24px}
  .cal{gap:5px}
  .cal .day{min-height:64px;padding:5px;font-size:11px}
  .cal .chip{font-size:9.5px;padding:2px 5px}
  .cal .dow{font-size:8.5px;letter-spacing:.06em}
  .modal{width:94vw;max-width:94vw;padding:22px}
  .frow{flex-direction:column;gap:12px}
}
</style>
</head>

<script>
/* ================= CONFIG ================= */
// !!! PEGA TUS CLAVES AQUÍ !!!
const SUPABASE_URL = "https://chwbvfyyorfjyttbwtad.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNod2J2Znl5b3Jmanl0dGJ3dGFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzI5NDIsImV4cCI6MjA5NzYwODk0Mn0.Rq72cAhS7D1J26FZgZ2jPQSXHTpP1Z2OY21WSPz3PgY";

/* Valores REALES de los enums de la BD (Fase 0) */
const ESTADOS_CLASE = ['programada','por_rellenar','impartida','cancelada_cobrada','cancelada_no_cobrada'];
const ESTADO_LABEL  = {
  programada:'Programada', por_rellenar:'Por rellenar', impartida:'Impartida',
  cancelada_cobrada:'Cancel. cobrada', cancelada_no_cobrada:'Cancel. sin cobro'
};
const METODOS_PAGO  = ['bizum','transferencia','efectivo','stripe'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const MESES_C = MESES.map(m=>m[0].toUpperCase()+m.slice(1));
const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let sb=null;
let D={alumnos:[],clases:[],pagos:[],bonos:[]};
let paidSet=new Set();
let view='none', alumnoSel=null, editClaseId=null, editAlumnoId=null, pagoClaseId=null;
let resumenMes=new Date(), calMes=new Date();

/* ================= BOOT Y AUTH ================= */
async function boot(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data: { session } } = await sb.auth.getSession();
  if(session) {
    document.getElementById('app').style.display = 'flex';
    refresh();
    requestAnimationFrame(fitBrand);
  } else {
    document.getElementById('login-wrapper').style.display = 'flex';
    requestAnimationFrame(fitBrand);
  }
}

async function doLogin(){
  const e = document.getElementById('login-email').value.trim();
  const p = document.getElementById('login-pass').value;
  const msg = document.getElementById('login-msg');
  msg.textContent = '';
  
  const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
  if(error) { 
    msg.textContent = error.message; 
  } else {
    document.getElementById('login-wrapper').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    refresh();
    requestAnimationFrame(fitBrand);
  }
}

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}

async function refresh(){
  const [a,c,p,b]=await Promise.all([
    sb.from('alumnos').select('*').order('created_at'),
    sb.from('clases').select('*').order('fecha',{ascending:false}).order('hora',{ascending:false}),
    sb.from('pagos').select('*').order('fecha',{ascending:false}),
    sb.from('bonos').select('*').order('fecha_compra',{ascending:false})
  ]);
  for(const r of [a,c,p,b]) if(r.error){toast('Error BD: '+r.error.message);console.error(r.error);return}
  D={alumnos:a.data,clases:c.data,pagos:p.data,bonos:b.data};
  computePaid();

    if(first){view='alumno';alumnoSel=first.id}else view='resumen';
  }
  render();
}

/* ================= LÓGICA ================= */
const alumno=id=>D.alumnos.find(a=>a.id===id);
const iniciales=n=>n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const eur=n=>(Math.round(n*100)/100).toLocaleString('es-ES',{maximumFractionDigits:2});
const hhmm=h=>h?h.slice(0,5):'';
const fmtD=f=>{const d=new Date(f+'T00:00:00');return String(d.getDate()).padStart(2,'0')+' '+MESES[d.getMonth()].slice(0,3)};
const sameMonth=(f,ref)=>{const d=new Date(f+'T00:00:00');return d.getFullYear()===ref.getFullYear()&&d.getMonth()===ref.getMonth()};

function precioClase(c){const a=alumno(c.alumno_id);return c.precio!=null?Number(c.precio):Number(a?.tarifa_default||0)}
const clasesDe=id=>D.clases.filter(c=>c.alumno_id===id);

/* --- Predicados sobre el estado REAL de la clase --- */
const esImpartida  = c => c.estado==='impartida';
const esCancelada  = c => c.estado==='cancelada_cobrada' || c.estado==='cancelada_no_cobrada';
const consumeHueco = c => c.estado==='impartida' || c.estado==='cancelada_cobrada'; // gasta bono / es cobrable
const enAgenda     = c => c.estado==='programada' || c.estado==='por_rellenar' || c.estado==='impartida'; // no canceladas

/* --- Reconciliación de pagos ---
   Una clase de bono está pagada por definición. Una clase suelta se paga
   con un pago propio. Como los pagos históricos importados NO llevan clase_id,
   repartimos el dinero libre del alumno a sus clases cobrables, la más antigua
   primero (misma convención que "aplicar abono a las más antiguas"). Los pagos
   nuevos hechos desde el panel sí llevan clase_id y se respetan directamente. */
function computePaid(){
  paidSet=new Set();
  for(const a of D.alumnos){
    const cobrables=D.clases
      .filter(c=>c.alumno_id===a.id && c.bono_id==null && consumeHueco(c))
      .sort((x,y)=>x.fecha.localeCompare(y.fecha)||String(x.hora||'').localeCompare(String(y.hora||'')));
    const pagosLibres=D.pagos.filter(p=>p.alumno_id===a.id && p.bono_id==null);
    const vinculados=new Set(pagosLibres.filter(p=>p.clase_id!=null).map(p=>p.clase_id));
    let bolsa=pagosLibres.filter(p=>p.clase_id==null).reduce((s,p)=>s+Number(p.importe),0);
    for(const c of cobrables){
      if(vinculados.has(c.id)){paidSet.add(c.id);continue}
      const precio=precioClase(c);
      if(bolsa+0.001>=precio){paidSet.add(c.id);bolsa-=precio}
    }
  }
}
function isPagada(c){return c.bono_id!=null||paidSet.has(c.id)}
function pagoDeClase(c){return D.pagos.find(p=>p.clase_id===c.id)}

/* Ordinal de la clase dentro de su bono (1/4, 2/4...), calculado, no guardado */
function ordinalBono(c){
  if(c.bono_id==null||!consumeHueco(c))return null;
  const hermanas=D.clases.filter(x=>x.bono_id===c.bono_id&&consumeHueco(x))
    .sort((x,y)=>x.fecha.localeCompare(y.fecha)||String(x.hora||'').localeCompare(String(y.hora||'')));
  const idx=hermanas.findIndex(x=>x.id===c.id);
  const bono=D.bonos.find(b=>b.id===c.bono_id);
  return idx>=0?{n:idx+1,total:bono?bono.clases_totales:4}:null;
}

function statsSet(cs,pagosSet){
  const imp=cs.filter(esImpartida);
  const cobrables=cs.filter(c=>c.bono_id==null&&consumeHueco(c)); // solo sueltas deben dinero
  const pag=cobrables.filter(isPagada);
  const sin=cobrables.filter(c=>!isPagada(c));
  return{
    impartidas:imp.length, pagadas:pag.length, sinPagar:sin.length,
    cobrado:pagosSet.reduce((s,p)=>s+Number(p.importe),0),
    pendiente:sin.reduce((s,c)=>s+precioClase(c),0)
  };
}
/* Saldo del bono: restantes = totales - gastadas (impartidas + canceladas con cobro) */
function saldoBono(id){
  const bonosAct=D.bonos.filter(b=>b.alumno_id===id&&b.estado==='activo');
  const total=bonosAct.reduce((s,b)=>s+Number(b.clases_totales),0);
  const consumidas=clasesDe(id).filter(c=>c.bono_id!=null&&consumeHueco(c)).length;
  return{total,consumidas,restantes:total-consumidas};
}
function deudaAlumno(id){
  const sin=clasesDe(id).filter(c=>c.bono_id==null&&consumeHueco(c)&&!isPagada(c));
  return{clases:sin.length,euros:sin.reduce((s,c)=>s+precioClase(c),0)};
}

/* ---------- agenda semanal ---------- */
function renderAgenda(){
  const now=new Date();const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  let html=`<div class="kicker">Agenda semanal</div><div class="h-title">Semana del ${mon.getDate()} de ${MESES[mon.getMonth()]}</div><div style="height:18px"></div>`;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const cs=D.clases.filter(c=>c.fecha===iso&&enAgenda(c)).sort((x,y)=>(x.hora||'').localeCompare(y.hora||''));
    if(!cs.length)continue;
    html+=`<div class="agday"><h3>${DIAS[i]} · ${String(d.getDate()).padStart(2,'0')} ${MESES[d.getMonth()].slice(0,3)}</h3>`+
      cs.map(c=>`<div class="agitem" onclick="goAlumno(${c.alumno_id})" style="cursor:pointer">
        <span class="mono">${hhmm(c.hora)||'—'}</span>
        <b style="font-weight:500">${alumno(c.alumno_id)?.nombre||'?'}</b>
        <span style="color:var(--muted)">${c.tema||''}</span>
        <span class="mono" style="margin-left:auto;font-size:12px;color:var(--muted)">${c.duracion_min||60} min</span>
      </div>`).join('')+`</div>`;
  }
  if(!/agday/.test(html))html+=`<div class="empty">No hay clases esta semana.</div>`;
  document.getElementById('main').innerHTML=html;
}

/* ---------- calendario ---------- */
function renderCalendario(){
  const ref=calMes,y=ref.getFullYear(),m=ref.getMonth();
  const first=new Date(y,m,1),start=(first.getDay()+6)%7,nd=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  let cells=DIAS.map(d=>`<div class="dow">${d.slice(0,3)}</div>`).join('');
  for(let i=0;i<start;i++)cells+=`<div class="day off"></div>`;
  for(let d=1;d<=nd;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cs=D.clases.filter(c=>c.fecha===iso&&enAgenda(c)).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    cells+=`<div class="day ${iso===today?'today':''}">${d}${cs.map(c=>`<span class="chip" onclick="goAlumno(${c.alumno_id})">${hhmm(c.hora)} ${(alumno(c.alumno_id)?.alias||alumno(c.alumno_id)?.nombre||'?').split(' ')[0]}</span>`).join('')}</div>`;
  }
  document.getElementById('main').innerHTML=`
  <div class="kicker">Calendario</div>
  <div class="monthnav">
    <div class="h-title">${MESES_C[m]} ${y}</div>
    <button onclick="movCal(-1)">‹</button><button onclick="movCal(1)">›</button>
  </div>
  <div class="cal">${cells}</div>`;
}
function movCal(n){calMes=new Date(calMes.getFullYear(),calMes.getMonth()+n,1);render()}

let informeTxt='';
function etiquetaLinea(c){
  if(c.bono_id!=null){const o=ordinalBono(c);return{txt:`BONO${o?` ${o.n}/${o.total}`:''}`,cls:'paid'}}
  if(c.estado==='cancelada_no_cobrada')return{txt:'CANCELADA',cls:'unpaid'};

}
function renderInforme(){
  const a=alumno(alumnoSel);
  const[y,m]=document.getElementById('infPeriodo').value.split('-').map(Number);
  const ref=new Date(y,m-1,1);

    .sort((x,z)=>x.fecha.localeCompare(z.fecha)||String(x.hora||'').localeCompare(String(z.hora||'')));

    return`${mark} ${fmtD(c.fecha)} ${hhmm(c.hora)} · ${c.tema||'—'}${est}`;

  informeTxt=`📋 Informe de clases — ${a.nombre}\nPeríodo: ${MESES_C[m-1]} ${y}\n\nClases impartidas: ${st.impartidas}\nPagadas: ${st.pagadas}  |  Sin pagar: ${st.sinPagar}\nCobrado: ${eur(st.cobrado)} €  |  Pendiente: ${eur(st.pendiente)} €\n${saldoLinea}\n\n— Clases —\n${lineas||'(sin clases este período)'}`;

  <div class="minicards">
    <div class="minicard"><div class="lb">Impartidas</div><div class="vl">${st.impartidas}</div></div>
    <div class="minicard"><div class="lb">Pagadas</div><div class="vl">${st.pagadas}</div></div>
    <div class="minicard"><div class="lb">Sin pagar</div><div class="vl">${st.sinPagar}</div></div>
    <div class="minicard"><div class="lb">Cobrado</div><div class="vl">${eur(st.cobrado)} €</div></div>
    <div class="minicard"><div class="lb">Pendiente</div><div class="vl">${eur(st.pendiente)} €</div></div>
  </div>

    <span class="bdg badge ${b.cls}">${b.txt}</span></div>`}).join('')||'<div class="empty">Sin clases en este período.</div>'}
  <div class="reporte">${informeTxt.replace(/</g,'&lt;')}</div>`;

/* Muestra/oculta el campo Precio según el Tipo (bono no lleva precio) */
function togglePrecioModo(){
  const esBono=cModo.value==='bono';
  document.getElementById('wrapPrecio').style.opacity=esBono?'.4':'1';
  cPrecio.disabled=esBono;
}
async function saveClase(e){
  e.preventDefault();
  const editC=editClaseId?D.clases.find(x=>x.id===editClaseId):null;
  const row={
    alumno_id:alumnoSel,fecha:cFecha.value,hora:cHora.value||null,
    duracion_min:+cDur.value,tema:cTema.value||null,proxima_clase:cProx.value||null,
    info_interna:cInfo.value||null,estado:cEstado.value,
    modo:editC?editC.modo:'manual_gcal' // manual desde el panel; en edición se respeta el original
  };
  if(cModo.value==='bono'){
    const b=bonoConSaldo(alumnoSel);
    if(!b){toast('No hay bono con saldo disponible');return}
    row.bono_id=b.id; row.precio=null;            // de bono: precio NULO (el precio vive en el bono)
  }else{
    row.bono_id=null; row.precio=cPrecio.value===''?null:+cPrecio.value; // suelta: precio propio
  }
  const q=editClaseId
    ?sb.from('clases').update(row).eq('id',editClaseId)
    :sb.from('clases').insert(row);
  const{error}=await q;
  if(error)return toast('Error: '+error.message);
  closeOv('ovClase');toast(editClaseId?'Clase actualizada':'Clase registrada');refresh();
}
function bonoConSaldo(alumnoId){
  for(const b of D.bonos.filter(x=>x.alumno_id===alumnoId&&x.estado==='activo').sort((x,y)=>x.fecha_compra.localeCompare(y.fecha_compra))){
    const usadas=D.clases.filter(c=>c.bono_id===b.id&&consumeHueco(c)).length;
    if(usadas<b.clases_totales)return b;
  }
  return null;
}
async function setEstado(id,estado){

/* abonos */

async function saveAbono(e){
  e.preventDefault();
  const{data:bono,error:e1}=await sb.from('bonos').insert({
    alumno_id:alumnoSel,fecha_compra:bFecha.value,precio:+bPrecio.value,

  }).select().single();
  if(e1)return toast('Error bono: '+e1.message);
  const{error:e2}=await sb.from('pagos').insert({
    alumno_id:alumnoSel,bono_id:bono.id,fecha:bFecha.value,
    importe:+bPrecio.value,metodo:bMetodo.value,referencia:bRef.value||null,conciliado:false
  });
  if(e2)return toast('Error pago: '+e2.message);
  if(document.getElementById('bAplicar').checked){
    const sin=clasesDe(alumnoSel).filter(c=>c.bono_id==null&&consumeHueco(c)&&!isPagada(c))
      .sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,+bClases.value);
    for(const c of sin)await sb.from('clases').update({bono_id:bono.id,precio:null}).eq('id',c.id);
  }
  closeOv('ovAbono');toast('Abono registrado');refresh();
}

/* alumnos */
function openAlumnoForm(id){
  editAlumnoId=id||null;
  document.getElementById('alumnoTitle').textContent=id?'Editar alumno':'Nuevo alumno';
  const a=id?alumno(id):{};
  aNombre.value=a.nombre||'';aAlias.value=a.alias||'';aTarifa.value=a.tarifa_default??'';
  aCanal.value=a.canal_principal||'';aGcal.value=a.gcal_keyword||'';aNotas.value=a.notas||'';
  aActivo.checked=id?!!a.activo:true;
  openOv('ovAlumno');
}
async function saveAlumno(e){
  e.preventDefault();
  const row={nombre:aNombre.value.trim(),alias:aAlias.value||null,
    tarifa_default:aTarifa.value===''?null:+aTarifa.value,
    canal_principal:aCanal.value||null,gcal_keyword:aGcal.value||null,
    notas:aNotas.value||null,activo:aActivo.checked};
  let err;
  if(editAlumnoId){({error:err}=await sb.from('alumnos').update(row).eq('id',editAlumnoId))}
  else{
    const{data,error}=await sb.from('alumnos').insert(row).select().single();
    err=error;if(data){alumnoSel=data.id;view='alumno'}
  }
  if(err)return toast('Error: '+err.message);
  closeOv('ovAlumno');toast('Alumno guardado');refresh();
}
async function delAlumno(id){
  const a=alumno(id);
  if(!confirm(`¿Eliminar a ${a.nombre} y TODAS sus clases, pagos y bonos?`))return;
  for(const t of ['pagos','clases','bonos','alumno_emails'])
    await sb.from(t).delete().eq('alumno_id',id);
  const{error}=await sb.from('alumnos').delete().eq('id',id);
  if(error)return toast('Error: '+error.message);
  view='resumen';toast('Alumno eliminado');refresh();
}

/* Copia de seguridad: descarga todos los datos como JSON (red de seguridad local) */
function exportBackup(){
  try{
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=`ateneos_copia_${stamp}.json`;
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    toast('Copia descargada');
  }catch(e){toast('Error al exportar: '+e.message)}
}

/* Iguala el ancho del subtítulo al de ATENEOS (bloque de marca alineado) */
function fitPair(w,s,subEm){
  if(!w||!s||!w.offsetParent) return;
  const nw=w.textContent.trim().length;
  const Ls=subEm*parseFloat(getComputedStyle(s).fontSize); // interletrado final del subtítulo
  s.style.marginRight=(-Ls)+'px';                          // anula el hueco final del subtítulo
  const target=s.getBoundingClientRect().width - Ls;       // ancho visible del subtítulo (manda)
  w.style.letterSpacing='0px'; w.style.marginRight='0px';
  const bw=w.getBoundingClientRect().width;
  const Lw=nw>1?(target-bw)/(nw-1):0;                       // ATENEOS se estira a ese ancho
  w.style.letterSpacing=Lw+'px';
  w.style.marginRight=(-Lw)+'px';                          // anula el hueco final de ATENEOS
}
function fitBrand(){
  fitPair(document.getElementById('bWord'),document.getElementById('bSub'),0.24); // login
  fitPair(document.getElementById('sWord'),document.getElementById('sSub'),0.16); // sidebar
